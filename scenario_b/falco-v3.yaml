apiVersion: v1
kind: Namespace
metadata:
  name: falco
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco
  namespace: falco
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: falco
subjects:
- kind: ServiceAccount
  name: falco
  namespace: falco
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-config
  namespace: falco
data:
  falco.yaml: |
    log_level: info
    stdout_output:
      enabled: true
    time_format_iso_8601: true
    engine:\n      kind: ebpf\n    rules_files:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/k8s-arsenal-rules.yaml
  k8s-arsenal-rules.yaml: |
    - rule: NSEnter Escape from Container
      desc: Detect nsenter escape
      condition: >
        spawned_process
        and proc.name = "nsenter"
        and proc.args contains "-t"
        and container
      output: "DETECTED [CRITICAL] NSEnter Escape: user=%user.name container=%container.name cmd=%proc.cmdline"
      priority: CRITICAL
      tags: [k8s_arsenal, escape, nsenter]

    - rule: Admin Kubeconfig Access
      desc: Detect read of /etc/kubernetes/admin.conf
      condition: >
        (open_read or open_read)
        and fd.name = "/etc/kubernetes/admin.conf"
        and container
      output: "DETECTED [CRITICAL] Kubeconfig Access: user=%user.name container=%container.name proc=%proc.cmdline"
      priority: CRITICAL
      tags: [k8s_arsenal, credential_access, kubeconfig]

    - rule: Cron Directory Write
      desc: Detect writing files to /etc/cron.d
      condition: >
        open_write
        and fd.directory = "/etc/cron.d"
        and container
      output: "DETECTED [CRITICAL] Cron Persistence: user=%user.name container=%container.name file=%fd.name cmd=%proc.cmdline"
      priority: CRITICAL
      tags: [k8s_arsenal, persistence, cron]

    - rule: SA Token Theft
      desc: Detect reading SA tokens from host
      condition: >
        (open_read or open_read)
        and fd.name endswith "/token"
        and fd.name contains "kube-api-access"
        and container
      output: "DETECTED [HIGH] SA Token Theft: user=%user.name container=%container.name file=%fd.name"
      priority: WARNING
      tags: [k8s_arsenal, credential_access, token]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: falco
  labels:
    app: falco
spec:
  selector:
    matchLabels:
      app: falco
  template:
    metadata:
      labels:
        app: falco
    spec:
      serviceAccountName: falco
      hostPID: true
      containers:
      - name: falco
        image: falcosecurity/falco-no-driver:0.39.0
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        args: ["/usr/bin/falco"]
        volumeMounts:
        - name: host-proc
          mountPath: /host/proc
          readOnly: true
        - name: host-dev
          mountPath: /host/dev
        - name: host-boot
          mountPath: /host/boot
          readOnly: true
        - name: host-lib-modules
          mountPath: /host/lib/modules
          readOnly: true
        - name: host-usr
          mountPath: /host/usr
          readOnly: true
        - name: host-root
          mountPath: /host
          readOnly: true
        - name: falco-config
          mountPath: /etc/falco/falco.yaml
          subPath: falco.yaml
        - name: k8s-arsenal-rules
          mountPath: /etc/falco/k8s-arsenal-rules.yaml
          subPath: k8s-arsenal-rules.yaml
      terminationGracePeriodSeconds: 5
      volumes:
      - name: host-proc
        hostPath:
          path: /proc
      - name: host-dev
        hostPath:
          path: /dev
      - name: host-boot
        hostPath:
          path: /boot
      - name: host-lib-modules
        hostPath:
          path: /lib/modules
      - name: host-usr
        hostPath:
          path: /usr
      - name: host-root
        hostPath:
          path: /
      - name: falco-config
        configMap:
          name: falco-config
      - name: k8s-arsenal-rules
        configMap:
          name: falco-config


